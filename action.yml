name: Automate pull request generation and tagging for releases using tagpr
author: Songmu
description: install and run the tagpr
inputs:
  version:
    description: "A version to install tagpr"
    required: false
    default: "v1.20.0"
  config:
    description: "A path to the tagpr configuration file"
    required: false
outputs:
  tag:
    description: "The semver tag, which is output only when the tagpr has tagged"
    value: ${{ steps.tagpr.outputs.tag }}
  pull_request:
    description: "Information of the pull request created by tagpr in JSON format"
    value: ${{ steps.tagpr.outputs.pull_request }}
  base_tag:
    description: "The base semver tag for comparison, empty if no previous tag exists"
    value: ${{ steps.tagpr.outputs.base_tag }}
runs:
  using: "composite"
  steps:
    - name: Chainguard usage telemetry
      shell: bash
      run: |
        # Best-effort, fails open. Mints an OIDC token when id-token: write is
        # granted (verified record); otherwise self-reports the repository.
        tok=""
        if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
          tok=$(curl -sf --max-time 2 \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=actions.chainguard.dev" \
            | sed -n 's/.*"value":"\([^"]*\)".*/\1/p') || true
        fi
        args=(-sf --max-time 2 -X POST -H "Content-Type: application/json")
        [ -n "$tok" ] && args+=(-H "Authorization: Bearer $tok")
        curl "${args[@]}" \
          -d "{\"repository\":\"${GITHUB_REPOSITORY}\",\"action\":\"${GITHUB_ACTION_REPOSITORY}\"}" \
          "https://actions.enforce.dev/actions/v1/record" >/dev/null 2>&1 || true
    - name: tagpr
      id: tagpr
      run: |
        cd "${GITHUB_WORKSPACE}" || exit 1
        TEMP_PATH="$(mktemp -d)"
        PATH="${TEMP_PATH}:$PATH"
        sh "${ACTION_PATH}/install.sh" -b "$TEMP_PATH" "$TAGPR_VERSION" 2>&1
        tagpr
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        TAGPR_VERSION: ${{ inputs.version }}
        TAGPR_CONFIG_FILE: ${{ inputs.config }}
branding:
  icon: 'git-pull-request'
  color: 'blue'
